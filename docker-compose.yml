services:
  # Database
  postgres-db:
    image: postgres:15
    container_name: alert-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: alert-service
      TZ: America/Sao_Paulo
    ports:
      - "5433:5432"

  # Infra
  config-server:
    build: ./services/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      retries: 5

  # Eureka
  eureka-server:
    build: ./services/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy

  # Services
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started

  sensor-service:
    build: ./services/sensor-service
    container_name: sensor-service
    restart: on-failure
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_started

  alert-service:
    build: ./services/alert-service
    container_name: alert-service
    restart: on-failure
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/alert-service
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - TZ=America/Sao_Paulo
    depends_on:
      config-server:
        condition: service_healthy
      postgres-db:
        condition: service_started
      eureka-server:
        condition: service_started
